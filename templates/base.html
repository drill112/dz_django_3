{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Кинотеатр{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6fb;
            color: #222;
        }

        header {
            background: #1f2a44;
            padding: 20px 0;
        }

        .nav {
            width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left, .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
        }

        .profile-box {
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
        }

        .profile-btn {
            background: #6c63ff;
            color: white;
            padding: 8px 14px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 8px 14px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            border: none;
            cursor: pointer;
        }

        .container {
            width: 1000px;
            margin: 40px auto;
        }

        .login-link {
            background: #27ae60;
            color: white;
            padding: 8px 14px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
        }

        .logout-form {
            margin: 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav">
            <div class="nav-left">
                <a href="{% url 'movie_list' %}">Фильмы</a>
                <a href="{% url 'session_list' %}">Сеансы</a>
            </div>

            <div class="nav-right">
                {% if user.is_authenticated %}
                    <div class="profile-box">
                        <span>{{ user.username }}</span>
                        <a href="{% url 'profile' %}" class="profile-btn">Посмотреть</a>

                        <form action="{% url 'logout' %}" method="post" class="logout-form">
                            {% csrf_token %}
                            <button type="submit" class="logout-btn">Выйти</button>
                        </form>
                    </div>
                {% else %}
                    <a href="{% url 'login' %}" class="login-link">Войти</a>
                {% endif %}
            </div>
        </div>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
