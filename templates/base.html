{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Кинотеатр{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6fb;
            color: #222;
        }

        header {
            background: #1f2a44;
            padding: 20px 0;
        }

        .nav {
            width: 1000px;
            margin: 0 auto;
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            width: 1000px;
            margin: 40px auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav">
            <a href="{% url 'movie_list' %}">Фильмы</a>
            <a href="{% url 'session_list' %}">Сеансы</a>
        </div>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
