{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<style>
    .login-card {
        width: 450px;
        margin: 50px auto;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
    }

    h1 {
        text-align: center;
        color: #1f2a44;
        margin-bottom: 25px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 18px;
        border: 1px solid #dcdcdc;
        border-radius: 10px;
        font-size: 16px;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #6c63ff;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
    }

    .errorlist {
        color: red;
        margin-bottom: 15px;
    }
</style>

<div class="login-card">
    <h1>Вход</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>
</div>
{% endblock %}
